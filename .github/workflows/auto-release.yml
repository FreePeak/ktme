name: Auto Release

on:
  push:
    branches:
      - main

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.bump.outputs.tag }}
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Get latest tag
      id: get_tag
      run: |
        LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
        echo "latest=$LATEST_TAG" >> $GITHUB_OUTPUT

    - name: Bump version
      id: bump
      run: |
        TAG="${{ steps.get_tag.outputs.latest }}"
        VERSION=${TAG#v}
        MAJOR=$(echo $VERSION | cut -d. -f1)
        MINOR=$(echo $VERSION | cut -d. -f2)
        PATCH=$(echo $VERSION | cut -d. -f3)
        PATCH=$((PATCH + 1))
        NEW_TAG="v$MAJOR.$MINOR.$PATCH"
        echo "tag=$NEW_TAG" >> $GITHUB_OUTPUT

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.bump.outputs.tag }}
        generate_release_notes: true
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Build
    needs: release
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            asset_name: ktme-linux-x64
          - target: x86_64-unknown-linux-musl
            asset_name: ktme-linux-x64-musl
          - target: x86_64-apple-darwin
            asset_name: ktme-darwin-x64
          - target: aarch64-apple-darwin
            asset_name: ktme-darwin-arm64
          - target: x86_64-pc-windows-msvc
            asset_name: ktme-windows-x64.exe

    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ needs.release.outputs.tag }}
        fetch-depth: 0

    - name: Install Linux dependencies (GNU)
      if: runner.os == 'Linux' && matrix.target == 'x86_64-unknown-linux-gnu'
      run: |
        sudo apt-get update
        sudo apt-get install -y pkg-config cmake perl

    - name: Install Linux dependencies (musl)
      if: runner.os == 'Linux' && matrix.target == 'x86_64-unknown-linux-musl'
      run: |
        sudo apt-get update
        sudo apt-get install -y musl-tools musl-dev cmake perl

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}

    - name: Build binary
      run: cargo build --release --target ${{ matrix.target }}
      env:
        CC_x86_64_unknown_linux_musl: musl-gcc

    - name: Strip binary (unix)
      if: matrix.target != 'x86_64-pc-windows-msvc'
      run: strip target/${{ matrix.target }}/release/ktme

    - name: Upload Release Asset
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ needs.release.outputs.tag }}
        files: |
          target/${{ matrix.target }}/release/ktme*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
